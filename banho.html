<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="stylebanho.css" />
    <script src="script.js" defer></script>
  </head>
  <body id="banho">
    <div class="ring-wrap">
      <svg viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="44" />
        <circle class="ring-progress" id="ring" cx="50" cy="50" r="44" />
      </svg>
      <div class="time-display">
        <span class="digits" id="digits">00:00</span>
        <span class="unit">min : seg</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn primary" id="btn-start">Iniciar</button>
      <button class="btn" id="btn-stop" disabled>Parar</button>
      <button class="btn" id="btn-reset" disabled>Resetar</button>
    </div>

    <div class="message-box" id="msg-box">
      <div class="emoji" id="msg-emoji"></div>
      <div class="msg-title" id="msg-title"></div>
      <div class="msg-text" id="msg-text"></div>
    </div>

    <div class="history-wrap" id="history-wrap" style="display: none">
      <div class="history-header">
        <span class="history-title">HISTÓRICO</span>
        <button class="btn-clear" id="btn-clear">Limpar</button>
      </div>
      <div class="history-list" id="history-list"></div>
      <p class="saved-badge"></p>
    </div>
  </body>
</html>
